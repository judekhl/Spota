<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="spota_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>spota_flutter</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!--
    Stub for passkeys_web, a transitive dependency of supabase_flutter.
    Spota does not use passkeys; this prevents a startup crash caused by
    passkeys_web calling PasskeyAuthenticator.init() at plugin registration.
  -->
  <script>
    window.PasskeyAuthenticator = {
      init: function () {},
      register: function () { return Promise.reject(new Error('passkeys not used')); },
      login: function () { return Promise.reject(new Error('passkeys not used')); },
      cancelCurrentAuthenticatorOperation: function () {},
      isUserVerifyingPlatformAuthenticatorAvailable: function () { return Promise.resolve(undefined); },
      isConditionalMediationAvailable: function () { return Promise.resolve(undefined); },
      hasPasskeySupport: function () { return false; }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
